name: playwright api ans ui test

# Когда запускаем workflow
on:
  push:
    branches:
      - main
  workflow_dispatch: # Ручной запуск

# Необходимые разрешения для деплоя на GitHub Pages
permissions:
  contents: write # Для записи в репозиторий
  pages: write # Для публикации на GitHub Pages
  id-token: write # Для аутентификации

jobs:
  pw5Tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # 2. Устанавливаем Node.js
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0

      # 3. Устанавливаем зависимости из package.json
      - name: Установка npm пакеты из package.json
        run: npm ci

      # 4. Устанавливаем браузеры для Playwright
      - name: Установка браузеров
        run: npx playwright install --with-deps

      # Устанавливаем утилиту allurectl для работы с Allure TestOps
      - name: Install Allure TestOps CLI
        run: |
          curl -L https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl
          chmod +x allurectl
          sudo mv allurectl /usr/local/bin/
        if: always()

      # Запускаем тесты
      - name: Запускаем тесты
        run: npm t
        continue-on-error: true
        if: always()

      # Проверяем наличие файлов allure-results после тестов
      - name: Debug allure-results location
        run: |
          echo "=== Количество файлов в allure-results ==="
          echo "JSON: $(find allure-results -name "*.json" 2>/dev/null | wc -l)"
          echo "PNG: $(find allure-results -name "*.png" 2>/dev/null | wc -l)"
        if: always()

      # Загружаем результаты тестов в Allure TestOps
      - name: Upload results to Allure TestOps
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
          ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
          ALLURE_RESULTS: allure-results
        run: |
          echo "=== Содержимое allure-results (первые 10 файлов) ==="
          ls -la allure-results/ | head -10
          echo ""
          echo "=== Загружаем с флагом force ==="
          allurectl upload --force
        continue-on-error: true
        if: always()

      # Генерируем Allure отчет
      - name: Сгенерировать allure отчет
        run: npx allure awesome ./allure-results --single-file
        continue-on-error: true
        if: always()

      # Исправляем структуру отчета (переносим summary.json в widgets)
      - name: Fix allure report structure
        run: |
          mkdir -p allure-report/widgets
          if [ -f allure-report/summary.json ]; then
            mv allure-report/summary.json allure-report/widgets/
            echo "✅ summary.json moved to widgets/"
          else
            echo "✅ summary.json already in widgets or not found"
          fi
        if: always()

      # ========== ШАГИ ДЛЯ ПУБЛИКАЦИИ ОТЧЕТА ==========

      # Настраиваем GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        if: always()

      # Загружаем отчет как артефакт для деплоя
      - name: Upload Allure Report Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          name: allure-report-artifact
          path: 'allure-report'

      # Публикуем отчет на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()
        with:
          artifact_name: allure-report-artifact

      # Отправляем уведомление в Telegram
      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          PROJECT_NAME: 'JS QA'
          TEST_ENV: 'GitHub Actions'
          REPORT_LINK: '${{ steps.deployment.outputs.page_url }}'
        run: |
          node scripts/send.mjs allure-report/widgets/summary.json

      # ========== СОХРАНЯЕМ АРТЕФАКТЫ ДЛЯ ПРОСМОТРА ==========

      # Сохраняем результаты тестов как артефакт
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6.0.0
        continue-on-error: true
        if: always()
        with:
          name: allure single file
          path: |
            allure-report/index.html
            allure-results
            playwright-report
